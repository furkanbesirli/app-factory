static_resources:
  listeners:
    - name: main_listener
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 80
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: ingress_http
                codec_type: AUTO
                route_config:
                  name: local_route
                  virtual_hosts:
                    - name: backend
                      domains: ["*"]
                      routes:
                        - match:
                            prefix: "/api/"
                          route:
                            cluster: api_service
                            prefix_rewrite: "/"
                            timeout: 300s
                        - match:
                            path: "/apps.json"
                          route:
                            cluster: api_service
                            prefix_rewrite: "/apps/config/all"
                            timeout: 10s
                        - match:
                            safe_regex:
                              google_re2: {}
                              regex: "^/([^/]+)/privacy-policy\\.html$"
                          route:
                            cluster: api_service
                            regex_rewrite:
                              pattern:
                                google_re2: {}
                                regex: "^/([^/]+)/privacy-policy\\.html$"
                              substitution: "/apps/policies/\\1/privacy"
                            timeout: 10s
                        - match:
                            safe_regex:
                              google_re2: {}
                              regex: "^/([^/]+)/child-safety\\.html$"
                          route:
                            cluster: api_service
                            regex_rewrite:
                              pattern:
                                google_re2: {}
                                regex: "^/([^/]+)/child-safety\\.html$"
                              substitution: "/apps/policies/\\1/child"
                            timeout: 10s
                        - match:
                            prefix: "/"
                          route:
                            cluster: web_service
                            timeout: 30s
                http_filters:
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
    - name: api_service
      connect_timeout: 5s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: api_service
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: api
                      port_value: 4000

    - name: web_service
      connect_timeout: 5s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: web_service
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: web
                      port_value: 3000

admin:
  address:
    socket_address:
      address: 0.0.0.0
      port_value: 9901
